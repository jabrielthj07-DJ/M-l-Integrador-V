<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Foldit:wght@100..900&family=Merienda:wght@300..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <title>Registro</title>
    <link rel="stylesheet" href="/Login/Login.css">

</head>
<body>
    <main class="conteiner_login">
        <section class="login_content">
        <div>
            <h1 class="form_titulo">Restablecer Contraseña</h1><br> 
            <form class="form_registro" >

                <div class="form_campo">
                    <label class="form_label" for="password">Contraseña:</label>
                    <input class="form_input" type="password" id="password" placeholder="◾◾◾◾◾◾" >
                </div>

                <div class="form_campo">
                    <label class="form_label" for="repeticion_password">Repetir Contraseña:</label>
                    <input class="form_input" type="password" id="repeticion_password" placeholder="◾◾◾◾◾◾" >
                </div>
                
                <button class="form_butom" type="submit">Restablecer Contraseña</button>
            </form>
            
<nav class="login_nav">
    <a class="login_link" href="Login.Html">¿Ya tienes una cuenta? <span class="link">Iniciar sesión</span></a>
</nav>

        </div>
        </section>
    </main>


</body>
</html>
