<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <main class="conteiner_login">
        <section class="login_content">
        <div>
            <h1 class="form_titulo">Iniciar Sesión</h1><br>  <!--Tactica DJ(No borrar) -->
            <form class="form_registro" >
                <div class="form_campo">
                    <label class="form_label" for="email">Correo electrónico:</label>
                    <input class="form_input" type="email" id="email" placeholder="Ingresa tu Email" >
                </div>
                
                <div class="form_campo">
                    <label class="form_label" for="password">Contraseña:</label>
                    <input class="form_input" type="password" id="password" placeholder="◾◾◾◾◾◾" >
                </div>
                
                <button class="form_butom" type="submit">Iniciar Sesión</button>
            </form>
            
<nav class="login_nav">
    <a class="login_link" href="/registro">¿No tienes una cuenta? <span class="link">Crear</span></a>
    <a class="login_link" href="/Olvido su Contraseña">¿Olvidaste tu contraseña? <span class="link">Recuperar</span></a>
</nav>

        </div>
        </section>
    </main>


</body>
